<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大忠电子 · 磁性元器件产品线全景</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* ===========================================
           CSS CUSTOM PROPERTIES (THEME)
           =========================================== */
        :root {
            /* 深蓝科技主题 */
            --bg-deck: #060a14;
            --slide-bg: #ffffff;
            --primary-blue: #0a4d8c;
            --primary-dark: #072d53;
            --accent-cyan: #0ea5e9;
            --accent-light: #38bdf8;
            --accent-gold: #d4a017;
            --text-dark: #0f172a;
            --text-mid: #334155;
            --text-light: #64748b;
            --text-white: #ffffff;
            --border-subtle: #e2e8f0;
            --gradient-hero: linear-gradient(135deg, #0a4d8c 0%, #072d53 50%, #041a33 100%);
            --gradient-card: linear-gradient(180deg, #f8fafc 0%, #ffffff 100%);
            --gradient-accent: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);

            /* 字体 */
            --font-display: 'Noto Serif SC', serif;
            --font-body: 'Noto Sans SC', sans-serif;

            /* 尺寸 */
            --title-size: 88px;
            --heading-size: 52px;
            --subheading-size: 32px;
            --body-size: 24px;
            --small-size: 20px;
            --tiny-size: 16px;

            /* 间距 */
            --slide-padding: 80px;
            --content-gap: 32px;

            /* 动画 */
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --duration-normal: 0.7s;
        }

        /* ===========================================
           BASE STYLES
           =========================================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* --- viewport-base.css contents --- */
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: var(--stage-bg, #000);
        }

        .deck-viewport {
            position: fixed;
            inset: 0;
            overflow: hidden;
            background: var(--stage-bg, #000);
        }

        .deck-stage {
            position: absolute;
            left: 0;
            top: 0;
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            transform-origin: 0 0;
            background: var(--slide-bg, #fff);
        }

        .slide {
            position: absolute;
            inset: 0;
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            display: block;
            visibility: hidden;
            opacity: 0;
            pointer-events: none;
            background: var(--slide-bg, #fff);
        }

        .slide.active,
        .slide.visible {
            visibility: visible;
            opacity: 1;
            pointer-events: auto;
            z-index: 1;
        }

        img,
        video,
        canvas,
        svg {
            max-width: 100%;
            max-height: 100%;
        }

        .deck-controls {
            position: fixed;
            left: 50%;
            bottom: 22px;
            transform: translateX(-50%);
            z-index: 1000;
        }

        @media print {
            html, body { width: 1920px; height: auto; overflow: visible; background: #fff; }
            .deck-viewport { position: static; overflow: visible; background: #fff; }
            .deck-stage { position: static; width: auto; height: auto; transform: none !important; background: none; }
            .slide { position: relative; display: block !important; visibility: visible !important; opacity: 1 !important; pointer-events: auto !important; width: 1920px; height: 1080px; break-after: page; }
            .slide:last-child { break-after: auto; }
            .deck-controls { display: none !important; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.2s !important; }
        }
        /* --- end viewport-base.css --- */

        /* ===========================================
           GLOBAL TYPOGRAPHY
           =========================================== */
        body {
            font-family: var(--font-body);
            color: var(--text-dark);
            -webkit-font-smoothing: antialiased;
        }

        /* ===========================================
           REVEAL ANIMATIONS
           =========================================== */
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity var(--duration-normal) var(--ease-out-expo),
                        transform var(--duration-normal) var(--ease-out-expo);
        }

        .slide.visible .reveal {
            opacity: 1;
            transform: translateY(0);
        }

        .reveal-left {
            opacity: 0;
            transform: translateX(-60px);
            transition: opacity var(--duration-normal) var(--ease-out-expo),
                        transform var(--duration-normal) var(--ease-out-expo);
        }

        .slide.visible .reveal-left {
            opacity: 1;
            transform: translateX(0);
        }

        .reveal-right {
            opacity: 0;
            transform: translateX(60px);
            transition: opacity var(--duration-normal) var(--ease-out-expo),
                        transform var(--duration-normal) var(--ease-out-expo);
        }

        .slide.visible .reveal-right {
            opacity: 1;
            transform: translateX(0);
        }

        .reveal-scale {
            opacity: 0;
            transform: scale(0.85);
            transition: opacity 0.8s var(--ease-out-expo),
                        transform 0.8s var(--ease-out-expo);
        }

        .slide.visible .reveal-scale {
            opacity: 1;
            transform: scale(1);
        }

        /* Stagger delays */
        .delay-1 { transition-delay: 0.12s !important; }
        .delay-2 { transition-delay: 0.24s !important; }
        .delay-3 { transition-delay: 0.36s !important; }
        .delay-4 { transition-delay: 0.48s !important;
